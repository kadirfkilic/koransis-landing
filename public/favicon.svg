<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- K mark - vertical stem -->
  <rect x="132" y="124" width="56" height="264" rx="28" fill="#fff"/>
  <!-- K mark - upper diagonal arm -->
  <rect x="180" y="106" width="56" height="196" rx="28" fill="#fff" transform="rotate(40 208 204)"/>
  <!-- K mark - lower diagonal arm (lighter) -->
  <rect x="180" y="210" width="56" height="196" rx="28" fill="#fff" fill-opacity=".7" transform="rotate(-40 208 308)"/>
</svg>
